services:
  db:
    image: postgres:17
    container_name: auth-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - auth-network

volumes:
  pg_data:

networks:
  auth-network:
    driver: bridge
