services:
  db:
    image: postgres:17
    container_name: auth_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - "pg_data:/var/lib/postgresql/data"
    networks:
      - auth_network

volumes:
  pg_data:

networks:
  auth_network:
    driver: bridge